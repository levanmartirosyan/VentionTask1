syntax = "proto3";

option csharp_namespace = "VentionTask1.WebApi.Grpc";

package users;

service UsersGrpc {
  rpc GetUserById (GetUserByIdRequest) returns (UserGrpcResponse);
}

message GetUserByIdRequest {
  string id = 1;
}

message UserGrpcResponse {
  string id = 1;
  string username = 2;
  string email = 3;
  string organization_id = 4;
  string organization_name = 5;
}